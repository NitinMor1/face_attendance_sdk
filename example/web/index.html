<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="face_attendance_sdk_example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>face_attendance_sdk_example</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- MediaPipe Vision SDK -->
  <script type="module">
    console.log('Loading MediaPipe Vision Bundle (ESM)...');
    try {
      // Import from JSDelivr ESM entry point
      const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3");
      
      window.FaceDetector = vision.FaceDetector;
      window.FilesetResolver = vision.FilesetResolver;
      
      console.log('MediaPipe Vision successfully exposed to window:', {
        FaceDetector: !!window.FaceDetector,
        FilesetResolver: !!window.FilesetResolver
      });
    } catch (e) {
      console.error('CRITICAL: Failed to load MediaPipe Vision ESM:', e);
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
